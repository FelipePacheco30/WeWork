services:
  - type: web
    name: wework-backend
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://wework-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: wework-db
          property: connectionString

  - type: web
    name: wework-frontend
    env: docker
    rootDir: frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://wework-backend.onrender.com

databases:
  - name: wework-db
    plan: free
